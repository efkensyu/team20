<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
</head>

<body>
	<th:block th:object="${regForm}">
		<h2>登録する内容に間違いはありませんか</h2>
		<p th:text="名前： + *{name}"></p>
		<br>
		<p th:text="'1番好きな趣味：' + 'ジャンル'+'	'+*{janru}+'	'+ *{hobby}"></p>
		<br>
		<p th:text="'2番好きな趣味：' + 'ジャンル'+'	'+*{janru2}+'	'+ *{hobby2}"></p>
		<br>
		<p th:text="'3番好きな趣味：' + 'ジャンル'+'	'+*{janru3}+'	'+ *{hobby3}"></p>
		<br>
		<!--		分野別で指定したものが表示されるようにする-->
		<p th:text="興味のあるIT分野： + *{job}"></p>
		<br>
		<p th:text="自己紹介： + *{intro}"></p>
		<br>
	</th:block>
	
	
	<input type="submit" value="戻る" name="back" />
	<input type="submit" value="実行" name="do" />
</body>

</html>
