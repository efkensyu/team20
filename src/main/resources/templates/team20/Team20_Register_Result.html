<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>登録確認画面</title>
	<link rel="stylesheet" type="text/css" th:href="@{/team20/team20_Register.css}">
	<link rel="icon" type="image/png" th:href="@{/Team20icon.png}">
</head>

<body>

	<div class="header">
		<!-- ✅ 左端に画像 -->
		<img th:src="@{/Team20logo.png}" width="100" height="50">
		<h1>プロフィール内容確認画面</h1>
	</div>

	<div class="content">
		<div class="content2">
			<form method="post" th:action="@{/Team20_Result}" th:object="${regForm}">

				<h2>登録する内容に間違いはありませんか</h2>
				<h3>氏名</h3>
				<p th:text="*{name}" class="textbox"></p>
				<h3>社員コード</h3>
				<p th:text="*{code}" class="textbox"></p>
				<br>
				<h3>1番目に好きな趣味</h3>
				<p th:text="'ジャンル'+'	'+*{janru}+'	'+'趣味' + *{hobby}"></p>
				<br>
				<h3>2番目に好きな趣味</h3>
				<p th:text="'ジャンル'+'	'+*{janru2}+'	'+'趣味' + *{hobby2}"></p>
				<br>
				<h3>3番目に好きな趣味</h3>
				<p th:text="'ジャンル'+'	'+*{janru3}+'	'+'趣味' + *{hobby3}"></p>
				<br>

				<!--		分野別で指定したものが表示されるようにする-->
				<h3>興味のあるIT分野</h3>
				<p th:text=" *{job}"></p>
				<br>

				<h3>自己紹介</h3>
				<textarea th:field="*{intro}" rows="10"></textarea>
				<!--					<p th:text="自己紹介： + *{intro}"></p>-->
				<br>


				<input type="submit" value="戻る" name="back" />
				<input type="submit" value="実行" name="do" />

			</form>

		</div>
	</div>

</body>

</html>
