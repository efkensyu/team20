<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>登録確認画面</title>
	<link rel="stylesheet" type="text/css" th:href="@{/team20/team20_Confirm.css}">
	<link rel="icon" type="image/png" th:href="@{/Team20icon.png}">
</head>
<body>
	<header>
		<div class="header">
			<img th:src="@{/Team20logo.png}" width="100" height="50">
			<h1>プロフィール内容確認画面</h1>
		</div>
	</header>

	<div class="main">
		<div class="content">
			<div class="content2">
				<form method="post" th:action="@{/Team20_Result}" th:object="${regForm}">

					<h2 class="confirm-title">登録する内容に間違いはありませんか</h2>

					<h3>氏名</h3>
					<div class="confirm-box">
						<p th:text="*{name}"></p>
					</div>

					<h3>社員コード</h3>
					<div class="confirm-box">
						<p th:text="*{code}"></p>
					</div>

					<h3>趣味</h3>
					<table class="ranking-table">
						<thead>
							<tr>
								<th class="rankingbar" colspan="2">１位</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td class="janru-title">ジャンル</td>
								<td th:text="*{janru}"></td>
							</tr>
							<tr>
								<td class="hobby-title">趣味</td>
								<td th:text="*{hobby}"></td>
							</tr>
						</tbody>
					</table>

					<table class="ranking-table">
						<thead>
							<tr>
								<th class="rankingbar" colspan="2">２位</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td class="janru-title">ジャンル</td>
								<td th:text="*{janru2}"></td>
							</tr>
							<tr>
								<td class="hobby-title">趣味</td>
								<td th:text="*{hobby2}"></td>
							</tr>
						</tbody>
					</table>

					<table class="ranking-table">
						<thead>
							<tr>
								<th class="rankingbar" colspan="2">３位</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td class="janru-title">ジャンル</td>
								<td th:text="*{janru3}"></td>
							</tr>
							<tr>
								<td class="hobby-title">趣味</td>
								<td th:text="*{hobby3}"></td>
							</tr>
						</tbody>
					</table>

					<h3>興味のあるIT分野</h3>
					<div class="confirm-box">
						<p th:text="*{job}"></p>
					</div>

					<h3>自己紹介</h3>
					<textarea th:field="*{intro}" rows="10" readonly></textarea>

					<div class="botton-container">
						<input class="button" type="submit" value="戻る" name="back">
						<input class="button" type="submit" value="確定する" name="do">
					</div>
				</form>
			</div>
		</div>
	</div>

	<footer>
		<p>&copy; 2026 B-IT Inc. All rights reserved.</p>
	</footer>
</body>
</html>
