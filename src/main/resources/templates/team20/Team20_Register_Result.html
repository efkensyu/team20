<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>登録確認</title>
	<link rel="stylesheet" type="text/css" th:href="@{team20/team20_Register_Result.css}">
	<link rel="icon" type="image/png" th:href="@{team20/Team20icon.png}">
</head>
<header>
	<div class="header">
		<img th:src="@{/team20/Team20logo.png}" width="100">
	</div>
</header>
<body>

	<div class="main">
		<div class="content">
			<h2 class="box">登録確認</h2>
			<div class="content2">
				<form method="post" th:action="@{/Team20_Result}" th:object="${regForm}">

					<h2 class="confirm-title">登録する内容に間違いはありませんか</h2>
					<input type="hidden" th:field="*{name}">
					<input type="hidden" th:field="*{code}">
					<input type="hidden" th:field="*{janru}">
					<input type="hidden" th:field="*{hobby}">
					<input type="hidden" th:field="*{janruNm}">
					<input type="hidden" th:field="*{hobbyNm}">
					<input type="hidden" th:field="*{janru2}">
					<input type="hidden" th:field="*{hobby2}">
					<input type="hidden" th:field="*{janruNm2}">
					<input type="hidden" th:field="*{hobbyNm2}">
					<input type="hidden" th:field="*{janru3}">
					<input type="hidden" th:field="*{hobby3}">
					<input type="hidden" th:field="*{janruNm3}">
					<input type="hidden" th:field="*{hobbyNm3}">
					<input type="hidden" th:field="*{job}">
					
					<h3>氏名</h3>
					<div class="confirm-box">
						<p th:text="*{name}"></p>
					</div>

					<h3>社員コード</h3>
					<div class="confirm-box">
						<p th:text="*{code}"></p>
					</div>

					<h3>趣味</h3>
					<table class="ranking-table">
						<thead>
							<tr>
								<th class="rankingbar" colspan="2">１位</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td class="janru-title">ジャンル</td>
								<td th:text="*{janruNm}"></td>
							</tr>
							<tr>
								<td class="hobby-title">趣味</td>
								<td th:text="*{hobbyNm}"></td>
							</tr>
						</tbody>
					</table>

					<table class="ranking-table">
						<thead>
							<tr>
								<th class="rankingbar" colspan="2">２位</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td class="janru-title">ジャンル</td>
								<td th:text="*{janruNm2}"></td>
							</tr>
							<tr>
								<td class="hobby-title">趣味</td>
								<td th:text="*{hobbyNm2}"></td>
							</tr>
						</tbody>
					</table>

					<table class="ranking-table">
						<thead>
							<tr>
								<th class="rankingbar" colspan="2">３位</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td class="janru-title">ジャンル</td>
								<td th:text="*{janruNm3}"></td>
							</tr>
							<tr>
								<td class="hobby-title">趣味</td>
								<td th:text="*{hobbyNm3}"></td>
							</tr>
						</tbody>
					</table>

					<h3>興味のあるIT分野</h3>
					<div class="confirm-box">
						<p th:text="*{job}"></p>
					</div>

					<h3>自己紹介</h3>
					<textarea th:field="*{intro}" rows="10" readonly></textarea>

					<div class="botton-container">
						<input class="button" type="submit" value="確定" name="do">
						<input class="button" type="submit" value="戻る" name="back">
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
<footer>
	<p>&copy; 2026 B-IT Inc. All rights reserved.</p>
</footer>
</html>
