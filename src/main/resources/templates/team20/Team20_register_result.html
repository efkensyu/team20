<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
</head>

<body>
	<th:block th:object="${regForm}">
		<h2>登録する内容に間違いはありませんか</h2>
		<p th:text="名前： + *{name}"></p>
		<br>
		<p th:text="1番好きな趣味： + *{janru}+ *{hobby}"></p>
		<br>
		<p th:text="2番好きな趣味： + *{janru2}+ *{hobby2}"></p>
		<br>
		<p th:text="3番好きな趣味： + *{janru3}+ *{hobby3}"></p>
		<br>
<!--		分野別で指定したものが表示されるようにする-->
		<p th:text="興味のあるIT分野： + *{info}"></p>
		<br>
		<p th:text="自己紹介： + *{intro}"></p>
		<br>
	</th:block>
</body>

</html>
