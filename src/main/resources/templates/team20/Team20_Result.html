<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.ofg">
<head>
<link rel="icon" href="logo.png" type="image/png.microsoft.icon">	
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1>検索結果</h1>
<th:block th:each="data, i : ${resultList}">
<form method="post" th:action="@{/Team20_Result}" >
	
		<div>
			<input type="hidden" name="shainCd" th:value="${data.shainCd}">
			<a th:text="*{i.count}"></a>
			<br>
			<a th:text="*{data.shainNm}"></a>
			<br>
			<a th:text="*{data.rank1}"></a>
			<br>
			<a th:text="*{data.rank2}"></a>
			<br>				
			<a th:text="*{data.rank3}"></a>
			<br>
			<input type="submit" value="詳細">
		</div>
</form>
</th:block>
</body>
</html>
