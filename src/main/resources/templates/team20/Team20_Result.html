<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"> <head>
	<link rel="icon" type="image/png" th:href="@{/team20/Team20icon.png}">
	<link rel="stylesheet" type="text/css" th:href="@{/team20/team20_Result.css}">
	<meta charset="UTF-8">
	<title>結果</title>
</head>
<body> <header>
	<div class="header">
		<img th:src="@{/team20/Team20logo.png}" width="100">
	</div>
</header>

	<div class="main">
		<div class="content">
			<h1 class="box">結果</h1>
			<div class="card-container">
				<th:block th:each="data, i : ${resultList}">
					<form method="post" th:action="@{/Team20_Result}">

						<div class="content2">
							<input type="hidden" name="shainCd" th:value="${data.shainCd}">
							<a th:text="${i.count}"></a>
							<a th:text="${data.shainNm}"></a>
							
							<a th:text="|1位：${data.rank1}|"></a>
							<a th:text="|2位：${data.rank2}|"></a>
							<a th:text="|3位：${data.rank3}|"></a>
							
							<input class="button" type="submit" name="details" value="詳細">
						</div>
					</form>
				</th:block>
			</div>
			
			<form method="post" th:action="@{/Team20_Menyu}">
				<div class="botton" style="margin-bottom: 40px; margin-top: 20px;">
					<input type="submit" name="back2" value="メニューに戻る">
				</div>
			</form>
		</div>
	</div>

<footer>
	<p>&copy; 2026 B-IT Inc. All rights reserved.</p>
</footer>

</body> </html>
