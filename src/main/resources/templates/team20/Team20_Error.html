<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>    
<meta charset="UTF-8">
<title>システムエラー</title>
<link rel="icon" type="image/png" th:href="@{/Team20icon.png}">	
<link rel="stylesheet" type="text/css" th:href="@{team20/team20_Error.css}">
</head>
<header>
	<div class="header">
		    <img th:src="@{/Team20logo.png}" width="100">
		</div>
</header>
<body>
	<div class="main">
		<diV class="content">
			 <diV class="content2">
				<h1 class="box">システムエラーが発生しました</h1>
				<p th:text="${errorMsg}">エラーメッセージがここに表示されます</p>
				<p>お手数ですが、時間をおいてから再度お試しいただくか、管理者へお問い合わせください。</p>
				<a th:href="@{/Team20_Login}" class="btn-back">ログイン画面へ戻る</a>
				<div class="debug-info">
					<strong>発生場所 (URL):</strong> <span th:text="${url}">/example</span>
				</div>
			</diV>
		</diV>
	</div>
</body>
<footer>
	<p>&copy; 2026 B-IT Inc. All rights reserved.</p>
</footer>
</html>
