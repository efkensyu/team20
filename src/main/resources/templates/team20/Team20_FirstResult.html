<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">
<head>
<meta charset="UTF-8">
<title>ユーザー登録</title>
<link rel="icon" type="image/png" th:href="@{/Team20icon.png}">	
<link rel="stylesheet" type="text/css" th:href="@{team20/team20_FirstResult.css}">
</head>
<header>
	<div class="header">
		    <img th:src="@{/Team20logo.png}" width="100">
		</div>
</header>
<body>
	<diV class="content">
	 	<diV class="content2">
			<h2>ユーザー登録</h2>
			<form method="post" th:action="@{/Team20_FirstResult}" >
				<h4>以下の内容でお間違いないでしょうか。</h4>
				<a>名前</a>
				<br>
				<th:block class="th" th:text="*{name}"></th:block>
				<br>
				<a>社員コード</a>
				<br>
				<th:block class="th" th:text="*{cord}"></th:block>
				<br>
				<a>パスワード</a>
				<br>
				<th:block class="th" th:text="*{password}"></th:block>
				<br>
				<input class="button" type="submit" name="regist" value="登録">
				<br>
				<input class="button" type="submit" name="back" value="戻る">
			</form>
		</diV>
	</diV>
</body>
<footer>
	<p>なにか</p>
</footer>
</html>
