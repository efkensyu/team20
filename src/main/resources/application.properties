## 💡【最重要】SQLファイルをJPA（Hibernate）が動き出す前に最優先で実行させる設定
spring.jpa.defer-datasource-initialization=true
#
## Hibernateによる自動テーブル生成を完全にOFF（初期化SQLとぶつかるのを防ぐ）
spring.jpa.properties.hibernate.ddl-auto=none